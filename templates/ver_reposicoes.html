<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reposições</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="container">
        <h1>Lista de Reposições</h1>

        {% if reposicao %}
            <div class="lista-reposicoes">
                {% for item in reposicao %}
                    <div class="card">
                        <p><strong>SKU:</strong> {{ item.sku }}</p>
                        <p>34: {{ item.t34 }}</p>
                        <p>35: {{ item.t35 }}</p>
                        <p>36: {{ item.t36 }}</p>
                        <p>37: {{ item.t37 }}</p>
                        <p>38: {{ item.t38 }}</p>
                        <p>39: {{ item.t39 }}</p>
                    </div>
                {% endfor %}
            </div>
        {% else %}
            <p class="empty">Nenhuma reposição encontrada.</p>
        {% endif %}

        <a href="{{ url_for('index') }}">Voltar ao Menu</a>
    </div>

</body>
